name: bootstrap-check

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  id-token: write # required to request the OIDC token from GitHub
  contents: read

jobs:
  oidc-smoke-test:
    runs-on: ubuntu-latest
    steps:
      - name: Assume CI role via OIDC — no stored AWS credentials anywhere in this repo
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::022440376627:role/makanlah-ci-readonly-plan
          aws-region: us-east-1

      - name: Verify assumed identity
        run: aws sts get-caller-identity
