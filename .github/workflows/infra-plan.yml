# PR validation for Terraform: fmt/validate/tflint/tfsec/Checkov gates, then
# a real `terraform plan` (read-only OIDC role) posted as a sticky PR comment.
name: infra

on:
  pull_request:

concurrency:
  group: infra-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  id-token: write

env:
  AWS_REGION: us-east-1

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            infra:
              - 'infra/**'
              - '.checkov.yaml'
              - '.tflint.hcl'

  static-checks:
    needs: changes
    if: needs.changes.outputs.infra == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.2"

      - name: terraform fmt
        run: terraform fmt -check -recursive infra

      - name: terraform validate (every stack)
        run: |
          for d in infra/bootstrap infra/envs/shared infra/envs/dev infra/envs/prod; do
            echo "=== $d"
            terraform -chdir=$d init -backend=false -input=false >/dev/null
            terraform -chdir=$d validate
          done

      - uses: terraform-linters/setup-tflint@v4
      - name: tflint
        run: |
          tflint --init --config "$GITHUB_WORKSPACE/.tflint.hcl"
          tflint --recursive --chdir infra --config "$GITHUB_WORKSPACE/.tflint.hcl"
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: tfsec (gate on HIGH+; MEDIUM/LOW are documented dev-tier choices)
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: infra
          additional_args: --minimum-severity HIGH

      - name: Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: infra
          config_file: .checkov.yaml

  plan:
    needs: changes
    if: needs.changes.outputs.infra == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.2"
          terraform_wrapper: false

      - name: Assume read-only plan role via OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::022440376627:role/makanlah-ci-readonly-plan
          aws-region: us-east-1

      - name: Plan shared + dev
        id: plan
        run: |
          {
            echo 'PLAN<<PLAN_EOF'
            for d in infra/envs/shared infra/envs/dev; do
              echo "### $d"
              terraform -chdir=$d init -input=false >/dev/null
              terraform -chdir=$d plan -input=false -lock=false -no-color 2>&1 | tail -60
              echo ""
            done
            echo 'PLAN_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Post plan as sticky PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- infra-plan -->';
            const body = `${marker}\n## Terraform plan\n\n\`\`\`\n${process.env.PLAN}\n\`\`\``;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number });
            const existing = comments.find(c => c.body.startsWith(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body });
            }
        env:
          PLAN: ${{ steps.plan.outputs.PLAN }}

  infra-ok:
    name: infra-ok
    needs: [changes, static-checks, plan]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Fail if any needed job failed
        run: |
          results='${{ join(needs.*.result, ' ') }}'
          echo "job results: $results"
          case "$results" in
            *failure*|*cancelled*) exit 1 ;;
          esac
