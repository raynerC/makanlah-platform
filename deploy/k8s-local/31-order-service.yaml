apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: makanlah
spec:
  replicas: 1
  selector:
    matchLabels: { app: order-service }
  template:
    metadata:
      labels: { app: order-service }
    spec:
      containers:
        - name: order-service
          image: makanlah/order-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          env:
            - { name: ORDERS_TABLE, value: orders }
            - { name: DYNAMODB_ENDPOINT_URL, value: "http://dynamodb-local:8000" }
            - { name: SQS_ENDPOINT_URL, value: "http://elasticmq:9324" }
            - { name: ORDER_EVENTS_QUEUE_URL, value: "http://elasticmq:9324/000000000000/order-events" }
            - { name: AWS_ACCESS_KEY_ID, value: local }
            - { name: AWS_SECRET_ACCESS_KEY, value: local }
            - { name: AWS_REGION, value: us-east-1 }
          livenessProbe:
            httpGet: { path: /healthz, port: 8000 }
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /readyz, port: 8000 }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits: { cpu: 500m, memory: 256Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: makanlah
spec:
  selector: { app: order-service }
  ports:
    - port: 8000
      targetPort: 8000
