// ElasticMQ config for local dev — mirrors the production SQS topology:
// main queue with a redrive policy of maxReceiveCount=3 into the DLQ.
include classpath("application.conf")

queues {
  order-events {
    defaultVisibilityTimeout = 5 seconds
    deadLettersQueue {
      name = "order-events-dlq"
      maxReceiveCount = 3
    }
  }
  order-events-dlq {}
}
