# Local development stack: the full MakanLah platform with zero AWS dependency.
#   make up-local   (or: docker compose up -d --build)
# DynamoDB Local stands in for DynamoDB, ElasticMQ for SQS (incl. DLQ redrive).

services:
  dynamodb-local:
    image: amazon/dynamodb-local:latest
    command: ["-jar", "DynamoDBLocal.jar", "-inMemory", "-sharedDb"]
    ports:
      - "8001:8000" # http://localhost:8001 from the host

  elasticmq:
    image: softwaremill/elasticmq-native:latest
    volumes:
      - ./deploy/local/elasticmq.conf:/opt/elasticmq.conf:ro
    ports:
      - "9324:9324" # SQS-compatible API
      - "9325:9325" # web ui: http://localhost:9325

  # one-shot: waits for dynamodb-local, creates the two tables, exits
  init-dynamodb:
    image: amazon/aws-cli:latest
    depends_on:
      - dynamodb-local
    environment:
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      AWS_DEFAULT_REGION: us-east-1
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        until aws dynamodb list-tables --endpoint-url http://dynamodb-local:8000 >/dev/null 2>&1; do
          echo "waiting for dynamodb-local..."; sleep 1;
        done
        aws dynamodb create-table --endpoint-url http://dynamodb-local:8000 \
          --table-name menus \
          --attribute-definitions AttributeName=pk,AttributeType=S AttributeName=sk,AttributeType=S \
          --key-schema AttributeName=pk,KeyType=HASH AttributeName=sk,KeyType=RANGE \
          --billing-mode PAY_PER_REQUEST 2>/dev/null || true
        aws dynamodb create-table --endpoint-url http://dynamodb-local:8000 \
          --table-name orders \
          --attribute-definitions AttributeName=order_id,AttributeType=S \
          --key-schema AttributeName=order_id,KeyType=HASH \
          --billing-mode PAY_PER_REQUEST 2>/dev/null || true
        echo "tables ready"

  menu-service:
    build: ./services/menu-service
    depends_on:
      init-dynamodb:
        condition: service_completed_successfully
    environment:
      MENUS_TABLE: menus
      DYNAMODB_ENDPOINT_URL: http://dynamodb-local:8000
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      AWS_REGION: us-east-1
    ports:
      - "8081:8000"

  order-service:
    build: ./services/order-service
    depends_on:
      init-dynamodb:
        condition: service_completed_successfully
      elasticmq:
        condition: service_started
    environment:
      ORDERS_TABLE: orders
      DYNAMODB_ENDPOINT_URL: http://dynamodb-local:8000
      SQS_ENDPOINT_URL: http://elasticmq:9324
      ORDER_EVENTS_QUEUE_URL: http://elasticmq:9324/000000000000/order-events
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      AWS_REGION: us-east-1
    ports:
      - "8082:8000"

  notify-worker:
    build: ./services/notify-worker
    depends_on:
      elasticmq:
        condition: service_started
    environment:
      ORDER_EVENTS_QUEUE_URL: http://elasticmq:9324/000000000000/order-events
      SQS_ENDPOINT_URL: http://elasticmq:9324
      WAIT_TIME_SECONDS: "2"
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      AWS_REGION: us-east-1
